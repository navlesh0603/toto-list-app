name: todo_app
description: A To-Do List app with Firebase Authentication and BLoC state management.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking (Firebase Realtime Database via REST API)
  dio: ^5.4.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.2.4

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
